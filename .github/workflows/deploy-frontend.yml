name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "webapp/nextjs/**"

env:
  AWS_REGION: ap-northeast-1
  S3_FRONTEND: ${{ vars.S3_FRONTEND }}
  S3_IMAGES: ${{ vars.S3_IMAGES }}
  ALB_DNS: ${{ vars.ALB_DNS }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp/nextjs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/early-riser-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/nextjs/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js (Static Export)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://${{ env.ALB_DNS }}
          NEXT_PUBLIC_IMAGES_URL: https://${{ env.S3_IMAGES }}.s3.ap-northeast-1.amazonaws.com

      - name: Deploy to S3
        run: aws s3 sync out/ s3://${{ env.S3_FRONTEND }} --delete

      - name: Summary
        run: |
          echo "### Frontend Deployed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://${{ env.S3_FRONTEND }}.s3-website-ap-northeast-1.amazonaws.com" >> $GITHUB_STEP_SUMMARY
