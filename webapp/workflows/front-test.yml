name: Front Test

on:
  push:
    branches: [main, dev]
    paths:
      - "webapp/nextjs/**"
  pull_request:
    branches: [main, dev]
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "webapp/nextjs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp/nextjs

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Build
        run: npm run build

#      - name: Run Tests
#        run: npm run test
